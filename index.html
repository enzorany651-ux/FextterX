<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEXTTER - LOGIN</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0a0f1e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Matrix Background */
        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.2;
            pointer-events: none;
        }

        /* Painel de Login */
        .login-panel {
            width: 450px;
            background: #0d0f1a;
            border: 2px solid #00e0ff;
            border-radius: 30px;
            box-shadow: 0 0 50px rgba(0, 224, 255, 0.3);
            padding: 40px;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(5px);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #00e0ff;
            font-size: 36px;
            font-weight: 800;
            text-shadow: 0 0 20px #00e0ff;
            letter-spacing: 2px;
        }

        .logo span {
            color: #fff;
            font-size: 14px;
            opacity: 0.7;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            color: #00e0ff;
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 15px;
            background: #131725;
            border: 2px solid #00e0ff40;
            border-radius: 15px;
            color: #fff;
            font-size: 16px;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #00e0ff;
            outline: none;
            box-shadow: 0 0 20px #00e0ff;
        }

        .input-group input::placeholder {
            color: #ffffff40;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: #00e0ff;
            color: #0d0f1a;
            border: none;
            border-radius: 40px;
            font-weight: 800;
            font-size: 18px;
            cursor: pointer;
            border: 2px solid #fff;
            box-shadow: 0 0 20px #00e0ff;
            transition: 0.3s;
            margin: 20px 0;
        }

        .login-btn:hover {
            transform: scale(1.02);
            background: #fff;
        }

        .error-message {
            color: #ff3366;
            text-align: center;
            margin: 10px 0;
            font-size: 14px;
            display: none;
            background: #ff336610;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ff3366;
        }

        .success-message {
            color: #00e0ff;
            text-align: center;
            margin: 10px 0;
            font-size: 14px;
            display: none;
            background: #00e0ff10;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #00e0ff;
        }

        .key-info {
            background: #131725;
            border: 1px solid #00e0ff40;
            border-radius: 15px;
            padding: 15px;
            color: #aaa;
            font-size: 13px;
            line-height: 1.8;
            text-align: center;
        }

        .key-info span {
            color: #00e0ff;
            font-weight: bold;
        }

        .music-control {
            position: absolute;
            bottom: 20px;
            right: 30px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 224, 255, 0.1);
            backdrop-filter: blur(5px);
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid #00e0ff60;
            cursor: pointer;
        }

        .music-icon {
            font-size: 16px;
            color: #00e0ff;
        }

        .music-text {
            color: #00e0ff;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <canvas id="matrixCanvas"></canvas>

    <div class="login-panel">
        <div class="logo">
            <h1>⚡ FEXTTER</h1>
            <span>DIGITE SUA KEY PARA ACESSAR</span>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <div class="input-group">
            <label>👤 SEU NOME</label>
            <input type="text" id="userName" placeholder="Digite seu nome" maxlength="30">
        </div>

        <div class="input-group">
            <label>🔑 SUA KEY</label>
            <input type="text" id="userKey" placeholder="XXXX-XXXX-XXXX-XXXX" style="text-transform:uppercase;">
        </div>

        <button class="login-btn" onclick="validateKey()">
            🚀 ENTRAR NO PAINEL
        </button>

        <div class="key-info">
            <span>⚠️ IMPORTANTE:</span><br>
            Use a key gerada no painel ADMIN<br>
            Cada key tem limite de usuários
        </div>
    </div>

    <div class="music-control" onclick="toggleMusic()">
        <span class="music-icon" id="musicIcon">🔊</span>
        <span class="music-text">DOORS LIGHT FUNK</span>
    </div>

    <audio id="backgroundMusic" loop preload="auto">
        <source src="https://s3.amazonaws.com/audio-files/doors-light-funk-ultra-slowed.mp3" type="audio/mpeg">
    </audio>

    <script>
        // ============================================
        // VARIÁVEIS
        // ============================================
        let musicPlaying = false;
        const music = document.getElementById('backgroundMusic');
        const musicIcon = document.getElementById('musicIcon');

        // ============================================
        // MATRIX EFFECT
        // ============================================
        function startMatrix() {
            const canvas = document.getElementById('matrixCanvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const ctx = canvas.getContext('2d');
            const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789';
            const charsArray = chars.split('');
            const fontSize = 16;
            const columns = canvas.width / fontSize;
            const drops = [];

            for (let i = 0; i < columns; i++) {
                drops[i] = Math.floor(Math.random() * -canvas.height / fontSize);
            }

            function draw() {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#00e0ff';
                ctx.font = fontSize + 'px monospace';

                for (let i = 0; i < drops.length; i++) {
                    const text = charsArray[Math.floor(Math.random() * charsArray.length)];
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                        drops[i] = 0;
                    }
                    drops[i]++;
                }
            }
            setInterval(draw, 35);
        }

        // ============================================
        // MÚSICA
        // ============================================
        function toggleMusic() {
            if (musicPlaying) {
                music.pause();
                musicIcon.textContent = '🔇';
            } else {
                music.play();
                musicIcon.textContent = '🔊';
            }
            musicPlaying = !musicPlaying;
        }

        // ============================================
        // VALIDAR KEY (INTEGRAÇÃO COM O PAINEL DE KEY)
        // ============================================
        function validateKey() {
            const userName = document.getElementById('userName').value.trim();
            const userKey = document.getElementById('userKey').value.trim().toUpperCase();
            
            const errorMsg = document.getElementById('errorMessage');
            const successMsg = document.getElementById('successMessage');
            
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            // Valida campos
            if (!userName || !userKey) {
                showError('❌ Preencha todos os campos!');
                return;
            }

            if (userName.length < 3) {
                showError('❌ Nome deve ter pelo menos 3 caracteres!');
                return;
            }

            // Busca as keys que foram geradas no admin.html
            const keys = JSON.parse(localStorage.getItem('fextter_keys')) || [];
            
            // Procura a key digitada
            const key = keys.find(k => k.code === userKey);

            if (!key) {
                showError('❌ Key inválida!');
                return;
            }

            if (!key.isActive) {
                showError('❌ Key desativada!');
                return;
            }

            // Verifica se a key expirou
            if (key.days !== 999 && key.expiryDate) {
                const expiry = new Date(key.expiryDate);
                if (new Date() > expiry) {
                    showError('❌ Key expirada!');
                    return;
                }
            }

            // Verifica limite de usuários
            if (key.usedBy && key.usedBy.length >= key.phones) {
                showError(`❌ Esta key já atingiu o limite de ${key.phones} usuário(s)!`);
                return;
            }

            // Verifica se este usuário já está registrado
            if (!key.usedBy) {
                key.usedBy = [];
            }

            if (!key.usedBy.includes(userName)) {
                // Adiciona novo usuário se ainda tem espaço
                if (key.usedBy.length < key.phones) {
                    key.usedBy.push(userName);
                    
                    // Atualiza o localStorage com o novo usuário
                    localStorage.setItem('fextter_keys', JSON.stringify(keys));
                } else {
                    showError(`❌ Limite de ${key.phones} usuários atingido!`);
                    return;
                }
            }

            // Salva a sessão do usuário
            const session = {
                userName: userName,
                key: key.code,
                loginTime: new Date().toISOString(),
                expiresAt: key.expiryDate,
                days: key.days
            };
            
            localStorage.setItem('fextter_session', JSON.stringify(session));
            
            // Mostra mensagem de sucesso
            let daysText = key.days === 999 ? 'Permanente' : key.days + ' dias';
            successMsg.innerHTML = `✅ Acesso liberado!<br>Bem-vindo, ${userName}<br>Key: ${daysText}`;
            successMsg.style.display = 'block';
            
            // Redireciona para o painel principal
            setTimeout(() => {
                window.location.href = 'painel.html'; // Seu painel de auxílio
            }, 2000);
        }

        function showError(msg) {
            const errorMsg = document.getElementById('errorMessage');
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
        }

        // ============================================
        // INICIALIZAÇÃO
        // ============================================
        window.onload = function() {
            startMatrix();
            music.volume = 0.3;
            music.play().catch(() => {});
            musicPlaying = true;

            // Verifica se já tem sessão ativa
            const session = localStorage.getItem('fextter_session');
            if (session) {
                const sessionData = JSON.parse(session);
                // Verifica se a sessão ainda é válida
                if (sessionData.expiresAt) {
                    const expiry = new Date(sessionData.expiresAt);
                    if (new Date() < expiry) {
                        // Sessão válida, vai direto pro painel
                        window.location.href = 'painel.html';
                    }
                } else if (sessionData.days === 999) {
                    // Key permanente, vai direto pro painel
                    window.location.href = 'painel.html';
                }
            }
        };
    </script>
</body>
</html>
