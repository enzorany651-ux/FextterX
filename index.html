<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEXTTER EXTERNAL</title>
    <style>
        /* MANTIVE SEU CSS EXATAMENTE IGUAL */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #0a0f1e; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; position: relative; overflow: hidden; }
        #matrixCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.15; pointer-events: none; }
        .login-container { width: 450px; background: #0d0f1a; border: 2px solid #00e0ff; border-radius: 30px; box-shadow: 0 0 50px rgba(0, 224, 255, 0.3); padding: 40px; position: relative; z-index: 2; backdrop-filter: blur(5px); display: flex; flex-direction: column; align-items: center; }
        .login-container.hidden { display: none; }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { color: #00e0ff; font-size: 36px; font-weight: 800; text-shadow: 0 0 20px #00e0ff; letter-spacing: 2px; }
        .input-group { width: 100%; margin-bottom: 20px; }
        .input-group label { color: #00e0ff; display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; }
        .input-group input { width: 100%; padding: 15px; background: #131725; border: 2px solid #00e0ff40; border-radius: 15px; color: #fff; font-size: 16px; transition: 0.3s; }
        .input-group input:focus { border-color: #00e0ff; outline: none; box-shadow: 0 0 20px #00e0ff; }
        .remember-group { width: 100%; display: flex; align-items: center; gap: 10px; margin-bottom: 20px; color: #fff; }
        .remember-group input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #00e0ff; }
        .login-btn { width: 100%; padding: 15px; background: #00e0ff; color: #0d0f1a; border: none; border-radius: 40px; font-weight: 800; font-size: 18px; cursor: pointer; border: 2px solid #fff; box-shadow: 0 0 20px #00e0ff; transition: 0.3s; margin: 20px 0; }
        .login-btn:hover { transform: scale(1.02); background: #fff; }
        .error-message { color: #ff3366; text-align: center; margin: 10px 0; font-size: 14px; display: none; background: #ff336610; padding: 10px; border-radius: 10px; border: 1px solid #ff3366; width: 100%; }
        
        /* ESTILOS DO PAINEL E ADMIN */
        .panel { width: 1000px; background: #0d0f1a; border: 2px solid #00e0ff; border-radius: 30px; box-shadow: 0 0 30px rgba(0, 224, 255, 0.3); padding: 25px; position: relative; z-index: 2; backdrop-filter: blur(5px); display: none; }
        .panel.active { display: block; }
        .user-header { display: flex; align-items: center; justify-content: space-between; background: rgba(0, 224, 255, 0.05); border: 1px solid #00e0ff40; border-radius: 50px; padding: 10px 20px; margin-bottom: 20px; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .user-avatar { width: 40px; height: 40px; background: #00e0ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #0d0f1a; font-weight: bold; font-size: 20px; border: 2px solid #fff; }
        .user-name { color: #00e0ff; font-weight: bold; font-size: 16px; }
        .logout-btn { background: transparent; color: #ff3366; border: 1px solid #ff3366; border-radius: 30px; padding: 6px 15px; font-size: 12px; cursor: pointer; transition: 0.3s; }
        .admin-btn { position: absolute; top: 100px; right: 30px; background: transparent; color: #00e0ff30; border: 1px solid #00e0ff30; border-radius: 20px; padding: 4px 12px; font-size: 10px; cursor: pointer; z-index: 100; }
        
        /* ADICIONAL PARA ADMIN PANEL VISIBILIDADE */
        #adminPanel { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 800px; background: #0f0f1a; border: 2px solid #9b4dff; border-radius: 30px; padding: 25px; z-index: 10000; display: none; overflow-y: auto; max-height: 90vh; }
        .admin-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; }
        .admin-modal.active { display: flex; }
        .admin-box { width: 400px; background: #0d0f1a; border: 3px solid #9b4dff; border-radius: 30px; padding: 30px; box-shadow: 0 0 60px #9b4dff; }
        .admin-box h2 { color: #9b4dff; text-align: center; margin-bottom: 20px; }
        .admin-box input { width: 100%; padding: 15px; background: #0a0a12; border: 2px solid #9b4dff; border-radius: 15px; color: #fff; margin-bottom: 20px; }
        .admin-box button { width: 100%; padding: 15px; background: #9b4dff; color: #0a0a12; border-radius: 30px; font-weight: bold; cursor: pointer; border: 2px solid #fff; }

        .music-control { position: fixed; bottom: 15px; right: 25px; z-index: 100; display: flex; align-items: center; gap: 10px; background: rgba(0, 224, 255, 0.1); backdrop-filter: blur(5px); padding: 8px 15px; border-radius: 50px; border: 1px solid #00e0ff40; cursor: pointer; }
    </style>
</head>
<body>
    <canvas id="matrixCanvas"></canvas>

    <audio id="bgMusic" loop>
        <source src="ACIDO 1.mp3" type="audio/mpeg">
    </audio>

    <div class="login-container" id="loginContainer">
        <div class="logo">
            <h1>⚡ FEXTTER</h1>
        </div>
        <div class="error-message" id="errorMessage"></div>
        <div class="input-group">
            <label>👤 NOME</label>
            <input type="text" id="userName" placeholder="Digite seu nome">
        </div>
        <div class="input-group">
            <label>🔑 KEY</label>
            <input type="text" id="userKey" placeholder="XXXX-XXXX-XXXX-XXXX" style="text-transform:uppercase;">
        </div>
        <div class="remember-group">
            <input type="checkbox" id="rememberMe" checked>
            <label for="rememberMe">Manter conectado</label>
        </div>
        <button class="login-btn" onclick="validateKey()">🚀 ENTRAR</button>
    </div>

    <div class="panel" id="panelContainer">
        <button class="admin-btn" onclick="showAdminModal()">ADM</button>
        <div class="user-header">
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">F</div>
                <div>
                    <div class="user-name" id="userNameDisplay">Usuário</div>
                    <div class="user-key-type" id="userKeyType">Plano Ativo</div>
                </div>
            </div>
            <button class="logout-btn" onclick="logout()">SAIR</button>
        </div>
        <h1 style="color:#00e0ff; text-align:center;">PAINEL ATIVADO</h1>
        <p style="color:#fff; text-align:center; margin-top:20px;">Bem-vindo ao FEXTTER EXTERNAL.</p>
    </div>

    <div class="admin-modal" id="adminModal">
        <div class="admin-box">
            <h2>🔐 ACESSO ADMIN</h2>
            <input type="password" id="adminKeyInput" placeholder="Senha Master">
            <button onclick="checkAdminKey()">VALIDAR</button>
            <button onclick="closeAdminModal()" style="margin-top:10px; background:#333; color:#fff;">FECHAR</button>
        </div>
    </div>

    <div id="adminPanel">
        <h2 style="color:#9b4dff; margin-bottom:15px;">GERENCIADOR DE KEYS</h2>
        <button onclick="generateNewKey()" style="background:#00cc66; padding:10px; border-radius:10px; cursor:pointer; font-weight:bold;">+ GERAR NOVA KEY (24H)</button>
        <div id="keysList" style="margin-top:20px; color:#fff;"></div>
        <button onclick="closeAdminPanel()" style="margin-top:20px; background:#ff3366; padding:10px; border-radius:10px; color:#fff;">VOLTAR</button>
    </div>

    <div class="music-control" id="musicUI" onclick="toggleMusic()">
        <span id="musicIcon">🔇</span>
        <span style="color:#00e0ff; font-size:12px;">ACIDO 1</span>
    </div>

    <script>
        // --- SISTEMA DE KEYS (CORRIGIDO) ---
        let validKeys = JSON.parse(localStorage.getItem('fextter_keys')) || ["ADMIN-FREE-2024", "TESTE-123"];

        function saveKeys() {
            localStorage.setItem('fextter_keys', JSON.stringify(validKeys));
        }

        function generateNewKey() {
            const pattern = "XXXX-XXXX-XXXX-XXXX";
            const newKey = pattern.replace(/X/g, () => "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ"[Math.floor(Math.random() * 36)]);
            validKeys.push(newKey);
            saveKeys();
            renderKeys();
            alert("Key Gerada: " + newKey);
        }

        function renderKeys() {
            const list = document.getElementById('keysList');
            list.innerHTML = validKeys.map(k => `<div style="padding:5px; border-bottom:1px solid #333">${k}</div>`).join('');
        }

        function validateKey() {
            const name = document.getElementById('userName').value;
            const key = document.getElementById('userKey').value.toUpperCase();
            const error = document.getElementById('errorMessage');

            if (name.length < 3) {
                error.textContent = "Nome muito curto!";
                error.style.display = "block";
                return;
            }

            if (validKeys.includes(key)) {
                // Entrar no painel
                document.getElementById('loginContainer').classList.add('hidden');
                document.getElementById('panelContainer').classList.add('active');
                document.getElementById('userNameDisplay').textContent = name;
                document.getElementById('userAvatar').textContent = name.charAt(0).toUpperCase();
                
                // Tenta tocar a música na entrada
                startMusic();
            } else {
                error.textContent = "Key inválida ou expirada!";
                error.style.display = "block";
            }
        }

        // --- SISTEMA DE MÚSICA ---
        const audio = document.getElementById('bgMusic');
        let isPlaying = false;

        function startMusic() {
            audio.play().then(() => {
                isPlaying = true;
                document.getElementById('musicIcon').textContent = "🔊";
            }).catch(e => console.log("Aguardando interação para tocar áudio."));
        }

        function toggleMusic() {
            if (isPlaying) {
                audio.pause();
                document.getElementById('musicIcon').textContent = "🔇";
            } else {
                audio.play();
                document.getElementById('musicIcon').textContent = "🔊";
            }
            isPlaying = !isPlaying;
        }

        // --- ADMIN CONTROLS ---
        function showAdminModal() { document.getElementById('adminModal').classList.add('active'); }
        function closeAdminModal() { document.getElementById('adminModal').classList.remove('active'); }
        
        function checkAdminKey() {
            const pass = document.getElementById('adminKeyInput').value;
            if (pass === "123") { // Sua senha de admin aqui
                closeAdminModal();
                document.getElementById('adminPanel').style.display = 'block';
                renderKeys();
            } else {
                alert("Senha Master Incorreta!");
            }
        }

        function closeAdminPanel() { document.getElementById('adminPanel').style.display = 'none'; }
        function logout() { location.reload(); }

        // --- MATRIX BACKGROUND ---
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*";
        const fontSize = 15;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(10, 15, 30, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00e0ff";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);
    </script>
</body>
</html>
